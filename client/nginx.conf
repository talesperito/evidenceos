server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cabeçalhos de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    # Assets com hash no nome: cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: qualquer rota cai no index.html (React Router/estado interno)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
