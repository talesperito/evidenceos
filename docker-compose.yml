services:
  db:
    image: postgres:16-alpine
    container_name: evidenceos-db
    restart: always
    environment:
      POSTGRES_USER: evidenceos_app
      POSTGRES_PASSWORD: evidenceos_dev_password
      POSTGRES_DB: evidenceos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
